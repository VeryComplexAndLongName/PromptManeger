name: Build and Push Prompt Man Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_SIZE_LIMIT_MB: "500"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve version from pyproject.toml
      id: version
      shell: bash
      run: |
        python -c "import os, tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); project = data['project']; name = str(project['name']).strip(); version = str(project['version']).strip(); description = str(project.get('description', '')).replace('\n', ' ').strip(); ghcr_owner = os.environ['GITHUB_REPOSITORY_OWNER'].strip().lower(); dockerhub_namespace = os.environ.get('DOCKERHUB_USERNAME', '').strip().lower(); fp = open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8'); fp.write(f'name={name}\nimage_name={name.lower()}\nversion={version}\ntag=v{version}\ndescription={description}\nghcr_owner={ghcr_owner}\ndockerhub_namespace={dockerhub_namespace}\n'); fp.close()"
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    - name: Create git tag from pyproject version
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists, skipping."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        push: true
        labels: |
          org.opencontainers.image.title=${{ steps.version.outputs.name }}
          org.opencontainers.image.description=${{ steps.version.outputs.description }}
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        tags: |
          ghcr.io/${{ steps.version.outputs.ghcr_owner }}/${{ steps.version.outputs.image_name }}:latest
          ghcr.io/${{ steps.version.outputs.ghcr_owner }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}
          ghcr.io/${{ steps.version.outputs.ghcr_owner }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.tag }}
          ${{ steps.version.outputs.dockerhub_namespace }}/${{ steps.version.outputs.image_name }}:latest
          ${{ steps.version.outputs.dockerhub_namespace }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}
          ${{ steps.version.outputs.dockerhub_namespace }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.tag }}

    - name: Report image size from GHCR
      id: image_size
      shell: bash
      run: |
        set -euo pipefail
        IMAGE_REF="ghcr.io/${{ steps.version.outputs.ghcr_owner }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}"
        docker pull "$IMAGE_REF"

        SIZE_BYTES="$(docker image inspect "$IMAGE_REF" --format '{{.Size}}')"
        SIZE_MB="$(( (SIZE_BYTES + 1024*1024 - 1) / (1024*1024) ))"

        {
          echo "### Docker image size"
          echo "- Image: $IMAGE_REF"
          echo "- Size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          echo "- Limit: ${IMAGE_SIZE_LIMIT_MB} MB"
        } >> "$GITHUB_STEP_SUMMARY"

        echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
        echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"
        echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"

    - name: Enforce max image size
      shell: bash
      run: |
        set -euo pipefail
        SIZE_MB="${{ steps.image_size.outputs.size_mb }}"
        WARN_MB="$(( IMAGE_SIZE_LIMIT_MB * 90 / 100 ))"

        if [ "$SIZE_MB" -ge "$WARN_MB" ] && [ "$SIZE_MB" -le "$IMAGE_SIZE_LIMIT_MB" ]; then
          echo "::warning::Image size is at ${SIZE_MB} MB, which is >= 90% of limit (${WARN_MB}/${IMAGE_SIZE_LIMIT_MB} MB)."
        fi

        if [ "$SIZE_MB" -gt "$IMAGE_SIZE_LIMIT_MB" ]; then
          echo "::error::Image is too large: ${SIZE_MB} MB (limit: ${IMAGE_SIZE_LIMIT_MB} MB)."
          exit 1
        fi
