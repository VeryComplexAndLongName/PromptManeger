name: Build and Push Prompt Man Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve version from pyproject.toml
      id: version
      shell: bash
      run: |
      eval "$(python - <<'PY'
import tomllib
from pathlib import Path

data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
    project = data["project"]
    name = project["name"]
    version = project["version"]
    description = project.get("description", "")

    def esc(value: str) -> str:
        return value.replace("\\", "\\\\").replace('"', '\\"')

    print(f'NAME="{esc(name)}"')
    print(f'VERSION="{esc(version)}"')
    print(f'DESCRIPTION="{esc(description)}"')
PY
      )"
      IMAGE_NAME="$NAME"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      echo "name=$NAME" >> "$GITHUB_OUTPUT"
      echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
      echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"
        echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

    - name: Create git tag from pyproject version
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "Tag $TAG already exists, skipping."
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        push: true
        labels: |
          org.opencontainers.image.title=${{ steps.version.outputs.name }}
          org.opencontainers.image.description=${{ steps.version.outputs.description }}
          org.opencontainers.image.version=${{ steps.version.outputs.version }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ steps.version.outputs.image_name }}:latest
          ghcr.io/${{ github.repository_owner }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}
          ghcr.io/${{ github.repository_owner }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.tag }}
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.version.outputs.image_name }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.version }}
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.version.outputs.image_name }}:${{ steps.version.outputs.tag }}
